name: Keep Streamlit Awake

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping deployed app
        run: |
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 10 --max-time 120 \
            "https://ipl-dashboard-comparative-ku4yz8ukhhqkhdsbtb66re.streamlit.app/" \
            -o /dev/null
